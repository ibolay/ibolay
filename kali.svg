<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="kali-icon">
  <defs>
    <style>
      @keyframes draw-ani {
        0% { stroke-dashoffset: 300; }
        50%, 100% { stroke-dashoffset: 0; }
      }
      @keyframes fill-ani {
        0%, 50% { stroke-dashoffset: 300; }
        80%, 100% { stroke-dashoffset: 0; }
      }
      #kali-icon {
        width: 200px;
        height: 200px;
      }
      .kali-path {
        fill: transparent;
        stroke: #222;
        stroke-width: 0.5;
        stroke-dasharray: 300;
        stroke-dashoffset: 300;
        animation: draw-ani 5s linear infinite;
      }
      .kali-fill-circle {
        transform-origin: 50px 50px;
        transform: rotate(-90deg);
        stroke: #2681ff; /* Kali mavisi */
        stroke-width: 100;
        fill: transparent;
        stroke-dasharray: 315;
        stroke-dashoffset: 315;
        animation: fill-ani 5s linear infinite;
      }
    </style>
    
